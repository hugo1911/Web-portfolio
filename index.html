<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hugo Manzano — iOS Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        oklch(0.10 0.010 240);
      --bg2:       oklch(0.14 0.010 240);
      --bg3:       oklch(0.17 0.010 240);
      --border:    oklch(0.22 0.010 240);
      --text:      oklch(0.96 0.005 240);
      --text2:     oklch(0.60 0.010 240);
      --text3:     oklch(0.40 0.008 240);
      --accent:    oklch(0.62 0.20 235);
      --accent2:   oklch(0.62 0.20 165);
      --accent-glow: oklch(0.62 0.20 235 / 0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── SELECTION ── */
    ::selection { background: var(--accent); color: #fff; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: oklch(0.10 0.010 240 / 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid oklch(0.22 0.010 240 / 0.5);
      transition: background 0.3s;
    }
    .nav-logo {
      font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links {
      display: flex; gap: 28px; list-style: none;
    }
    .nav-links a {
      font-size: 13px; font-weight: 500; color: var(--text2);
      text-decoration: none; letter-spacing: 0.2px;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-cta {
      font-size: 13px; font-weight: 500;
      background: var(--accent); color: #fff;
      border: none; border-radius: 20px;
      padding: 7px 16px; cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }
    .nav-cta:hover { opacity: 0.85; transform: scale(1.03); }

    /* mobile nav hamburger */
    .nav-hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .nav-hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: all 0.3s;
    }

    @media (max-width: 680px) {
      .nav-links, .nav-cta { display: none; }
      .nav-hamburger { display: flex; }
    }

    /* ── SECTIONS ── */
    section { padding: 100px 24px; }
    .section-inner { max-width: 860px; margin: 0 auto; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 24px 60px;
      position: relative; overflow: hidden;
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.35;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 40%, transparent 100%);
    }
    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .hero-inner {
      position: relative; z-index: 1;
      text-align: center; max-width: 720px; margin: 0 auto;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
      color: var(--accent);
      background: oklch(0.62 0.20 235 / 0.12);
      border: 1px solid oklch(0.62 0.20 235 / 0.25);
      border-radius: 20px; padding: 5px 14px;
      margin-bottom: 28px;
    }
    .hero-badge::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .hero-name {
      font-size: clamp(38px, 7vw, 72px);
      font-weight: 700; letter-spacing: -2px; line-height: 1.05;
      color: var(--text);
      margin-bottom: 16px;
    }
    .hero-name em { font-style: normal; color: var(--accent); }
    .hero-title {
      font-size: clamp(15px, 2.5vw, 20px);
      font-weight: 400; color: var(--text2);
      margin-bottom: 36px;
      letter-spacing: -0.2px;
    }
    .hero-title strong { color: var(--text); font-weight: 500; }
    .hero-ctas {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 500;
      border: none; border-radius: 28px;
      padding: 13px 28px; cursor: pointer; text-decoration: none;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 0 0 var(--accent-glow);
    }
    .btn-primary:hover {
      opacity: 0.88; transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--bg2); color: var(--text);
      font-size: 14px; font-weight: 500;
      border: 1px solid var(--border); border-radius: 28px;
      padding: 13px 28px; cursor: pointer; text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-secondary:hover { background: var(--bg3); transform: translateY(-2px); }

    /* ── SCROLL FADE ── */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1),
                  transform 0.65s cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.visible { opacity: 1; transform: none; }

    /* ── LABELS ── */
    .eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 700; letter-spacing: -1px; line-height: 1.1;
      margin-bottom: 16px;
    }
    .section-sub {
      font-size: 16px; color: var(--text2); max-width: 540px;
      line-height: 1.65; margin-bottom: 56px;
    }

    /* ── ABOUT ── */
    #about { background: var(--bg); }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
      align-items: start;
    }
    @media (max-width: 620px) { .about-grid { grid-template-columns: 1fr; gap: 32px; } }
    .about-text p {
      font-size: 16px; color: var(--text2); line-height: 1.75;
      margin-bottom: 16px;
    }
    .about-text p strong { color: var(--text); font-weight: 500; }
    .about-stat-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .about-stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
    }
    .about-stat-num {
      font-size: 28px; font-weight: 700; letter-spacing: -1px;
      color: var(--text); margin-bottom: 4px;
    }
    .about-stat-num span { color: var(--accent); }
    .about-stat-label { font-size: 12px; color: var(--text2); }

    /* ── EXPERIENCE ── */
    #experience { background: var(--bg2); }

    .timeline {
      position: relative;
      padding-left: 28px;
    }
    .timeline::before {
      content: '';
      position: absolute; left: 0; top: 6px; bottom: 6px;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent), var(--border) 80%, transparent);
    }
    .timeline-item {
      position: relative;
      padding-bottom: 52px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot {
      position: absolute; left: -34px; top: 5px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--bg2), 0 0 12px var(--accent-glow);
    }
    .timeline-meta {
      display: flex; align-items: baseline; gap: 12px;
      flex-wrap: wrap; margin-bottom: 6px;
    }
    .exp-period {
      font-size: 11px; font-weight: 500; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--accent);
    }
    .exp-company {
      font-size: 11px; color: var(--text3); font-weight: 400;
    }
    .exp-role {
      font-size: 20px; font-weight: 600; letter-spacing: -0.4px;
      margin-bottom: 10px; line-height: 1.2;
    }
    .exp-desc {
      font-size: 14px; color: var(--text2); line-height: 1.75;
      max-width: 580px;
    }
    .exp-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .tag {
      font-size: 11px; font-weight: 500; letter-spacing: 0.2px;
      color: var(--text2);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px;
    }

    /* ── PROJECTS ── */
    #projects { background: var(--bg); }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .project-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 18px; padding: 28px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .project-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }
    .project-card:hover::before { opacity: 1; }
    .project-card:hover {
      border-color: oklch(0.62 0.20 235 / 0.5);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px oklch(0 0 0 / 0.4);
    }
    .project-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: oklch(0.62 0.20 235 / 0.14);
      border: 1px solid oklch(0.62 0.20 235 / 0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 18px;
    }
    .project-icon.green {
      background: oklch(0.62 0.20 165 / 0.14);
      border-color: oklch(0.62 0.20 165 / 0.2);
    }
    .project-icon.purple {
      background: oklch(0.62 0.20 290 / 0.14);
      border-color: oklch(0.62 0.20 290 / 0.2);
    }
    .project-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .project-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }
    .project-link {
      font-size: 12px; font-weight: 500; color: var(--accent);
      display: inline-flex; align-items: center; gap: 4px;
      text-decoration: none; position: relative; z-index: 1;
    }
    .project-link::after { content: '→'; transition: transform 0.2s; }
    .project-card:hover .project-link::after { transform: translateX(4px); }

    /* ── SKILLS ── */
    #skills { background: var(--bg2); }
    .skills-cols {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }
    .skill-group {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
    }
    .skill-group-title {
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text3);
      margin-bottom: 16px;
    }
    .skill-item {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .skill-item:last-child { margin-bottom: 0; }
    .skill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }
    .skill-dot.teal { background: var(--accent2); }
    .skill-dot.purple { background: oklch(0.62 0.20 290); }
    .skill-name { font-size: 14px; color: var(--text); }

    /* ── CONTACT ── */
    #contact {
      background: var(--bg);
      text-align: center;
    }
    .contact-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px; padding: 60px 40px;
      max-width: 560px; margin: 0 auto;
      position: relative; overflow: hidden;
    }
    .contact-card::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: -100px; left: 50%; transform: translateX(-50%);
      pointer-events: none;
    }
    .contact-card h2 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.8px;
      margin-bottom: 12px; position: relative;
    }
    .contact-card p {
      font-size: 15px; color: var(--text2);
      margin-bottom: 36px; position: relative;
    }
    .contact-links {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; position: relative;
    }
    .contact-link {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 500;
      text-decoration: none; color: var(--text);
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 28px; padding: 12px 22px;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
    }
    .contact-link:hover {
      border-color: var(--accent); background: var(--bg);
      transform: translateY(-2px);
    }
    .contact-link svg { flex-shrink: 0; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px 24px;
      font-size: 12px; color: var(--text3);
      border-top: 1px solid var(--border);
    }

    /* ── MOBILE MENU OVERLAY ── */
    .mobile-menu {
      position: fixed; inset: 0; z-index: 200;
      background: oklch(0.10 0.010 240 / 0.97);
      backdrop-filter: blur(20px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 36px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .mobile-menu.open { opacity: 1; pointer-events: all; }
    .mobile-menu a {
      font-size: 28px; font-weight: 600; letter-spacing: -0.5px;
      color: var(--text); text-decoration: none;
      transition: color 0.2s;
    }
    .mobile-menu a:hover { color: var(--accent); }
    .mobile-close {
      position: absolute; top: 16px; right: 24px;
      background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 28px; line-height: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── TWEAKS ─── */
    const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
      "accentHue": 165,
      "fontScale": 100,
      "showGrid": true,
      "cardStyle": "bordered"
    }/*EDITMODE-END*/;

    /* ─── INTERSECTION OBSERVER HOOK ─── */
    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.12 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

    /* ─── NAV ─── */
    function Nav({ onMenuOpen }) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', fn);
        return () => window.removeEventListener('scroll', fn);
      }, []);
      return (
        <nav style={{ background: scrolled ? 'oklch(0.10 0.010 240 / 0.95)' : 'oklch(0.10 0.010 240 / 0.70)' }}>
          <a href="#hero" className="nav-logo">Hugo<span>.</span></a>
          <ul className="nav-links">
            {['About','Experience','Projects','Skills','Contact'].map(s => (
              <li key={s}><a href={`#${s.toLowerCase()}`}>{s}</a></li>
            ))}
          </ul>
          <a href="#contact" className="nav-cta">Contact</a>
          <button className="nav-hamburger" onClick={onMenuOpen} aria-label="Open menu">
            <span /><span /><span />
          </button>
        </nav>
      );
    }

    /* ─── MOBILE MENU ─── */
    function MobileMenu({ open, onClose }) {
      return (
        <div className={`mobile-menu${open ? ' open' : ''}`}>
          <button className="mobile-close" onClick={onClose}>✕</button>
          {['About','Experience','Projects','Skills','Contact'].map(s => (
            <a key={s} href={`#${s.toLowerCase()}`} onClick={onClose}>{s}</a>
          ))}
        </div>
      );
    }

    /* ─── HERO ─── */
    function Hero({ showGrid }) {
      const [typed, setTyped] = useState('');
      const full = 'Swift & SwiftUI';
      useEffect(() => {
        let i = 0;
        const iv = setInterval(() => {
          setTyped(full.slice(0, i + 1));
          i++;
          if (i >= full.length) clearInterval(iv);
        }, 70);
        return () => clearInterval(iv);
      }, []);

      return (
        <section id="hero">
          {showGrid && <div className="hero-grid" />}
          <div className="hero-glow" />
          <div className="hero-inner">
            <div className="hero-badge">Available for opportunities · 2026</div>
            <h1 className="hero-name">
              Hugo<br /><em>Manzano.</em>
            </h1>
            <p className="hero-title">
              iOS Mobile Developer &nbsp;·&nbsp; <strong>{typed}<span style={{opacity: typed.length < full.length ? 1 : 0, animation: 'pulse-dot 1s infinite'}}>|</span></strong>
            </p>
            <div className="hero-ctas">
              <a href="#projects" className="btn-primary">View Projects</a>
              <a href="#contact" className="btn-secondary">Get in touch</a>
            </div>
          </div>
        </section>
      );
    }

    /* ─── ABOUT ─── */
    function About() {
      return (
        <section id="about">
          <div className="section-inner">
            <div className="eyebrow reveal">About</div>
            <div className="about-grid">
              <div className="about-text reveal">
                <h2 className="section-title">Engineering meets<br />craft.</h2>
                <p>
                  I'm a <strong>Computer Engineering student</strong> at Cetys Universidad, graduating Summer 2026. My focus is building native iOS applications with seamless, intuitive user experiences.
                </p>
                <p>
                  I work in a <strong>Mac environment</strong> full-time and currently complement my development skills with hands-on corporate experience in <strong>software quality assurance</strong> for the medical technology industry.
                </p>
                <p>
                  This gives me a <strong>comprehensive view of the software development life cycle</strong> — from first commit to production release.
                </p>
              </div>
              <div className="about-stat-grid reveal">
                {[
                  { num: '2026', label: 'Expected graduation', accent: false },
                  { num: '2+', label: 'Years in QA / testing', accent: true },
                  { num: '100%', label: 'Native iOS focus', accent: false },
                  { num: '#1', label: 'Hackathon national finalist', accent: true },
                ].map(s => (
                  <div className="about-stat" key={s.label}>
                    <div className="about-stat-num">{s.accent ? <><span>{s.num}</span></> : s.num}</div>
                    <div className="about-stat-label">{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── EXPERIENCE ─── */
    function Experience() {
      const items = [
        {
          period: '2024 — Present',
          company: 'MedTech Company · International Mobile App Team',
          role: 'Mobile QA Engineer — Intern',
          desc: 'Working with agile methodologies in a bilingual English environment on an international mobile application. Responsible for quality assurance, mobile application testing, and driving continuous integration pipelines.',
          tags: ['Appium','Jira','GitHub CI','Agile / Scrum','Mobile Testing','Bilingual'],
        },
        {
          period: '2022 — Summer 2026',
          company: 'Cetys Universidad · Baja California, Mexico',
          role: 'Computer Engineering',
          desc: 'Full-stack engineering curriculum covering software architecture, databases, machine learning, and mobile development. Active participant in entrepreneurship and tech competition programs.',

    /* ─── ROOT APP ─── */
    function App() {
      const [menuOpen, setMenuOpen] = useState(false);
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULS);

      /* Apply accent hue tweak */
      useEffect(() => {
        const h = tweaks.accentHue;
        const root = document.documentElement;
        root.style.setProperty('--accent',      `oklch(0.62 0.20 ${h})`);
        root.style.setProperty('--accent2',     `oklch(0.62 0.20 ${h + 130})`);
        root.style.setProperty('--accent-glow', `oklch(0.62 0.20 ${h} / 0.18)`);
      }, [tweaks.accentHue]);

      /* Apply font scale */
      useEffect(() => {
        document.body.style.fontSize = `${tweaks.fontScale}%`;
      }, [tweaks.fontScale]);

      useReveal();

      return (
        <>
          <Nav onMenuOpen={() => setMenuOpen(true)} />
          <MobileMenu open={menuOpen} onClose={() => setMenuOpen(false)} />
          <Hero showGrid={tweaks.showGrid} />
          <About />
          <Experience />
          <Projects />
          <Skills />
          <Contact />
          <Footer />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Brand" />
            <TweakSlider label="Accent hue" value={tweaks.accentHue} min={0} max={360} step={5}
                         onChange={v => setTweak('accentHue', v)} />
            <TweakSection label="Typography" />
            <TweakSlider label="Font scale %" value={tweaks.fontScale} min={85} max={115} step={1}
                         onChange={v => setTweak('fontScale', v)} />
            <TweakSection label="Decoration" />
            <TweakToggle label="Hero grid" value={tweaks.showGrid}
                         onChange={v => setTweak('showGrid', v)} />
          </TweaksPanel>
        </>
      );
    }
